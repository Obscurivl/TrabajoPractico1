    <h1>Omelette al paso</h1>

    <h2>Ingredientes</h2>

    <ul>
        <li>2 huevos</li>
        <li>Sal</li>
        <li>Queso (opcional)</li>
        <li>Aceite</li>
    </ul>

    <h2>Pasos a seguir</h2>

    <ol>
        <li>Batí los huevos con sal.</li>
        <li>Poné un poco de aceite en la sartén.</li>
        <li>Verté la mezcla y cociná 2 minutos</li>
        <li>Agregá queso, doblalo y a comer</li>
    </ol>
